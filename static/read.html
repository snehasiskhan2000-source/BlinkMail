<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Read Email | BlinkMail</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css?v=ultramax">
</head>
<body>
    <div class="top-navbar">
        <div class="brand-logo" onclick="window.location.href='/'" style="cursor: pointer;" title="Go to Home">
            <span class="brand-icon"><i class="fa-solid fa-envelope-circle-check"></i></span>
            BLINKMAIL
        </div>
        <a href="https://t.me/Snehasiskhan" target="_blank" class="contact-btn">Contact Us</a>
    </div>

    <div class="inbox-wrapper">
        <div class="inbox-box">
            <a href="#" id="backBtn" class="btn-back-header"><i class="fa-solid fa-angle-left"></i> BACK TO LIST</a>
            
            <div class="inbox-body" style="min-height: auto;">
                
                <div class="read-header-top">
                    <div class="profile-avatar" id="readAvatar">BK</div>
                    <div class="read-sender-info">
                        <div class="read-name" id="readSenderName">Loading...</div>
                        <div class="read-email-address" id="readSenderEmail">Loading...</div>
                    </div>
                </div>

                <div class="read-info-row">
                    <span class="read-info-label">Date:</span> 
                    <span class="read-info-value" id="readDate" style="font-weight: 400;">Loading...</span>
                </div>

                <div class="read-info-row">
                    <span class="read-info-label">Subject:</span> 
                    <span class="read-info-value" id="readSubject">Loading...</span>
                </div>

                <div class="read-body" id="readBody">
                    <div style="text-align:center; padding: 40px;"><i class="fa-solid fa-circle-notch fa-spin fa-2x"></i></div>
                </div>

            </div>
        </div>
    </div>
    <script src="/static/script.js?v=ultramax"></script>
</body>
</html>
