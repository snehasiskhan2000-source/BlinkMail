<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inbox | BlinkMail</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <div class="inbox-wrapper">
        <div class="brand-header"><i class="fa-solid fa-envelope-open-text" style="color:var(--neon-blue); margin-right:10px;"></i> Blink<span>Mail</span></div>

        <div class="email-panel">
            <p>Your Temporary Email Address</p>
            <div class="input-glass">
                <input type="text" id="current-email-input" class="email-input" readonly value="Loading server...">
            </div>
            <div class="btn-grid">
                <button class="btn-glass"><i class="fa-solid fa-qrcode"></i> QR Code</button>
                <button class="btn-glass active" id="copyBtn1" onclick="copyEmail()"><i class="fa-solid fa-copy"></i> Copy</button>
            </div>
        </div>

        <div class="action-row">
            <button class="action-btn" onclick="copyEmail()"><i class="fa-solid fa-copy"></i> Copy</button>
            <button class="action-btn" onclick="fetchEmails()"><i class="fa-solid fa-rotate-right"></i> Refresh</button>
            <button class="action-btn" onclick="window.location.href='/'"><i class="fa-solid fa-pen-to-square"></i> Change</button>
            <button class="action-btn" onclick="window.location.href='/'"><i class="fa-solid fa-xmark"></i> Delete</button>
        </div>

        <div class="inbox-box">
            <div class="inbox-title">INBOX</div>
            <div class="inbox-body" id="message-list">
                </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
